name = "wiki3-ai-sync-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
# ── GitHub OAuth App Setup ────────────────────────────────────────────
# Create an OAuth App at:
#   https://github.com/organizations/wiki3-ai/settings/applications
#
# Settings:
#   Name: "Wiki3.ai Sync"
#   Homepage URL: https://wiki3-ai.github.io/jupyterlite-demo/
#   Callback URL: https://wiki3-ai-sync-proxy.jim-2ad.workers.dev/oauth/callback
#   Device Flow: not needed (using standard web flow)
#
# Then set the credentials as secrets:
#   npx wrangler secret put GITHUB_CLIENT_ID
#   npx wrangler secret put GITHUB_CLIENT_SECRET
#
# Deploy:
#   npx wrangler deploy

# Allowed origins (comma-separated). Set to "*" for any, or restrict to your site.
ALLOWED_ORIGINS = "https://wiki3-ai.github.io"
