[project]
name = "jupyterlite-wiki-addon"
version = "0.1.1"
description = "JupyterLite addon that generates wiki HTML pages from notebooks at build time"
requires-python = ">=3.12"
dependencies = [
    "jupyterlite-core>=0.7.0",
    "nbconvert>=7.0",
    "nbformat>=5.0",
    "jinja2>=3.0",
]

[project.entry-points."jupyterlite.addon.v0"]
wiki = "jupyterlite_wiki_addon.addon:WikiPageAddon"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["jupyterlite_wiki_addon"]
