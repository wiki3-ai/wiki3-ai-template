name: Re-render wiki pages

# Triggers when notebooks are pushed to main (via the deploy extension
# or a normal git push).  Checks out the gh-pages site, syncs the
# latest files from main, re-renders wiki HTML, and pushes back to
# gh-pages.

on:
  push:
    branches: [main]
    paths:
      - "files/**"          # only when notebooks change
  workflow_dispatch:         # allow manual re-render

concurrency:
  group: wiki-render
  cancel-in-progress: true

permissions:
  contents: write            # push back to gh-pages

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install rendering dependencies
        run: pip install nbconvert nbformat jinja2

      - name: Sync files from main to gh-pages
        run: |
          rsync -av --delete main/files/ site/files/

      - name: Render wiki pages
        run: |
          python main/.github/scripts/render-wiki.py site/ \
            --templates-dir main/packages/jupyterlite_wiki_addon/jupyterlite_wiki_addon/templates

      - name: Commit and push to gh-pages
        run: |
          cd site
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add files/ wiki/ api/
          if git diff --cached --quiet; then
            echo "No wiki changes to commit."
          else
            git commit -m "Auto-render wiki pages [skip ci]"
            git push
          fi
