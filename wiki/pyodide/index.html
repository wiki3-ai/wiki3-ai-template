<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wiki Index - pyodide</title>
  <link rel="stylesheet" href="../../build/themes/@jupyterlab/theme-light-extension/index.css" media="(prefers-color-scheme: light), (prefers-color-scheme: no-preference)" />
  <link rel="stylesheet" href="../../build/themes/@jupyterlab/theme-dark-extension/index.css" media="(prefers-color-scheme: dark)" />
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; }
    body.jp-mod-light, body.jp-mod-dark { background: var(--jp-layout-color0); color: var(--jp-ui-font-color1); }
    .jp-Button, .jp-Button:visited {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      border: 1px solid var(--jp-border-color2);
      background: var(--jp-layout-color2);
      color: inherit;
      text-decoration: none;
      font-size: var(--jp-ui-font-size1, 14px);
      line-height: 1.4;
      cursor: pointer;
    }
    .jp-Button:hover, .jp-Button:focus {
      border-color: var(--jp-brand-color1);
      text-decoration: none;
    }
    .jp-Button:focus-visible {
      outline: 2px solid var(--jp-brand-color1);
      outline-offset: 2px;
    }
    button.jp-Button {
      appearance: none;
      -webkit-appearance: none;
    }
    .wiki-toolbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--jp-layout-color1);
      border-bottom: 1px solid var(--jp-border-color2);
    }
    .wiki-toolbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
    }
    .wiki-toolbar-title {
      font-weight: 600;
      font-size: var(--jp-ui-font-size2, 16px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .wiki-toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .wiki-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: calc(100vh - 50px);
    }
    .wiki-sidebar {
      border-right: 1px solid var(--jp-border-color2);
      background: var(--jp-layout-color1);
      padding: 0.75rem 0;
      overflow-y: auto;
      position: sticky;
      top: 50px;
      height: calc(100vh - 50px);
      font-size: var(--jp-ui-font-size1, 13px);
    }
    .wiki-sidebar-loading { padding: 1rem; color: var(--jp-ui-font-color2); }
    .wiki-nav-section { margin-bottom: 0.25rem; }
    .wiki-nav-folder-header {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.75rem;
      cursor: pointer;
      font-weight: 500;
      color: var(--jp-ui-font-color1);
      user-select: none;
    }
    .wiki-nav-folder-header:hover { background: var(--jp-layout-color2); }
    .wiki-nav-arrow {
      display: inline-block;
      width: 12px;
      text-align: center;
      transition: transform 0.15s;
      font-size: 10px;
      color: var(--jp-ui-font-color2);
    }
    .wiki-nav-arrow.open { transform: rotate(90deg); }
    .wiki-nav-items { list-style: none; margin: 0; padding: 0; }
    .wiki-nav-items.collapsed { display: none; }
    .wiki-nav-item a {
      display: block;
      padding: 0.25rem 0.75rem 0.25rem 1.5rem;
      color: var(--jp-content-link-color, var(--jp-ui-font-color1));
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .wiki-nav-item a:hover { background: var(--jp-layout-color2); text-decoration: none; }
    .wiki-nav-item.active a {
      font-weight: 600;
      background: var(--jp-brand-color3, rgba(33, 150, 243, 0.12));
      border-right: 3px solid var(--jp-brand-color1);
    }
    .wiki-nav-nested .wiki-nav-item a { padding-left: 2.25rem; }
    .wiki-nav-nested .wiki-nav-nested .wiki-nav-item a { padding-left: 3rem; }
    .wiki-breadcrumbs {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-wrap: wrap;
    }
    .wiki-breadcrumb-sep {
      color: var(--jp-ui-font-color2);
      margin: 0 0.125rem;
    }
    .wiki-breadcrumb-current {
      font-weight: 600;
    }
    .wiki-main {
      max-width: 960px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      min-width: 0;
    }
    .wiki-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .wiki-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 1rem;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--jp-border-color2);
    }
    .wiki-name {
      min-width: 0;
    }
    .wiki-name a {
      color: var(--jp-content-link-color, inherit);
      text-decoration: none;
      word-break: break-all;
    }
    .wiki-name a:hover { text-decoration: underline; }
    .wiki-action-button {
      padding: 0.25rem 0.5rem;
    }
    .wiki-action-button svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
    .wiki-share-success {
      box-shadow: 0 0 0 2px var(--jp-success-color1);
    }
    .wiki-sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
    .wiki-actions {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
    }
    .wiki-toolbar + * {
      padding-top: 0.75rem;
    }
    /* Folder styles */
    .wiki-folder {
      margin-bottom: 0.5rem;
    }
    .wiki-folder-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--jp-border-color2);
    }
    .wiki-folder-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      color: inherit;
      transition: transform 0.2s ease;
    }
    .wiki-folder-toggle svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
    .wiki-folder-toggle[aria-expanded="true"] {
      transform: rotate(90deg);
    }
    .wiki-folder-icon {
      display: inline-flex;
      align-items: center;
      color: var(--jp-ui-font-color2);
    }
    .wiki-folder-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
    .wiki-folder-name {
      font-weight: 500;
    }
    .wiki-folder-name a {
      color: var(--jp-content-link-color, inherit);
      text-decoration: none;
    }
    .wiki-folder-name a:hover {
      text-decoration: underline;
    }
    .wiki-folder-contents {
      display: none;
      padding-left: 1.5rem;
      margin-top: 0.25rem;
    }
    .wiki-folder-contents.wiki-expanded {
      display: block;
    }
    .wiki-sidebar-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      color: inherit;
      font-size: 18px;
    }
    @media (max-width: 768px) {
      .wiki-sidebar-toggle { display: inline-flex; }
      .wiki-layout { grid-template-columns: 1fr; }
      .wiki-sidebar {
        display: none;
        position: fixed;
        top: 50px;
        left: 0;
        width: 260px;
        height: calc(100vh - 50px);
        z-index: 999;
        box-shadow: 2px 0 8px rgba(0,0,0,.15);
      }
      .wiki-sidebar.open { display: block; }
    }
    @media (max-width: 480px) {
      .wiki-row {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      .wiki-actions {
        order: 2;
      }
      .wiki-name {
        order: 1;
      }
    }
  </style>
